# ── Release title & tag ──────────────────────────────────────────────────────
# $RESOLVED_VERSION is computed from labels:
#   breaking → major, feature → minor, otherwise → patch
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# ── Template for the whole release body ─────────────────────────────────────
# $CHANGES is replaced by the categorised PR list generated below.
template: |
  $CHANGES

# ── Category definitions ────────────────────────────────────────────────────
# Each PR is placed under the first matching category based on its labels.
categories:
  - title: "⚠️  Breaking Changes"
    labels: ["breaking"]
  - title: "🚀  Features"
    labels: ["feature", "enhancement"]
  - title: "🐛  Bug Fixes"
    labels: ["bug", "bugfix"]
  - title: "🔧  Refactoring"
    labels: ["refactoring"]
  - title: "⚡  Performance"
    labels: ["performance"]
  - title: "📖  Documentation"
    labels: ["documentation"]
  - title: "🧪  Testing"
    labels: ["testing"]
  - title: "👷  CI / Build"
    labels: ["ci", "build"]
  - title: "📦  Dependencies"
    labels: ["dependencies"]
  - title: "🛠  Miscellaneous"
    labels: ["chore", "misc"]

# ── Exclusions & formatting ─────────────────────────────────────────────────
exclude-labels: ["skip-changelog", "duplicate", "invalid", "wontfix"]
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
no-changes-template: "No notable changes."

# ── Version resolution ──────────────────────────────────────────────────────
# Maps PR labels to SemVer bump level.
version-resolver:
  major:  { labels: ["breaking"] }
  minor:  { labels: ["feature", "enhancement"] }
  patch:  { labels: ["bug", "bugfix", "refactoring", "performance",
                     "documentation", "testing", "ci", "build",
                     "dependencies", "chore", "misc"] }
  default: patch

# ── Autolabeler (optional) ──────────────────────────────────────────────────
# Automatically applies labels based on changed file paths or PR title.
# Uncomment to enable:
# autolabeler:
#   - label: "documentation"
#     files: ["docs/**/*", "*.md"]
#   - label: "ci"
#     files: [".github/**/*"]
#   - label: "testing"
#     files: ["tests/**/*"]
#   - label: "dependencies"
#     title: "/^build\\(deps\\)/"
