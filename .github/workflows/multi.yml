name: Qrisp unit tests via Pytest

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main
  push:
    branches:
      - main
      - multiple_enviroments

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test Py${{ matrix.python-version }} on ${{ matrix.os }} (${{ matrix.test-group.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11.*", "3.12.*"]
        test-group:
          - name: core
            paths: "tests/circuit_tests tests/core_tests tests/primitives_tests tests/jax_tests tests/test_typing.py"
          - name: algorithms-and-integrations
            paths: "tests/algorithms_tests tests/operators_tests tests/block_encodings_tests tests/interface_tests tests/stim_integration_tests"
        
        # Default flags for Linux and macOS
        pip-extras: ["[dev,catalyst,xdsl,iqm]"]
        pytest-flags: [""]

        include:
          # Apply Windows-specific overrides based on the test group
          - os: windows-latest
            test-group:
              name: core
            pip-extras: "[dev-windows,xdsl,iqm]"
            # Exclude tests that are not supported on Windows
            pytest-flags: '-k "not test_catalyst_interface and not test_qubit_array_fusion"'          
          
          - os: windows-latest
            test-group:
              name: algorithms-and-integrations
            pip-extras: "[dev-windows,xdsl,iqm]"
            # Exclude tests that are not supported on Windows
            pytest-flags: '--ignore=tests/interface_tests/test_converter_qrisp_to_qml.py'
            
    steps:  
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".${{ matrix.pip-extras }}"
      - name: Test with pytest (${{ matrix.test-group.name }})
        run: |
          pytest ${{ matrix.test-group.paths }} ${{ matrix.pytest-flags }}
