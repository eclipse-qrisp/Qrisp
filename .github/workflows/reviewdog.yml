name: Code Quality (reviewdog)

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Pinned to a full commit SHA instead of a mutable version tag.
      # In March 2025, attackers moved the v1 tag of this action to a malicious
      # commit that exfiltrated CI secrets from runner memory. Pinning to a SHA
      # ensures we always run the exact audited version, immune to tag rewrites.
      - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f  # v1.5.0

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff via reviewdog
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check src/ --output-format=rdjson --exit-zero | \
            reviewdog -f=rdjson \
                      -reporter=github-pr-review \
                      -filter-mode=added \
                      -fail-level=none
