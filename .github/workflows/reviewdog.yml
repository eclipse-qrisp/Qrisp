name: Code Quality (reviewdog)

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: reviewdog/action-setup@v1.5.0

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff via reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check src/ --output-format=rdjson | \
            reviewdog -f=rdjson \
                      -reporter=github-pr-review \
                      -filter-mode=added \
                      -fail-level=none
