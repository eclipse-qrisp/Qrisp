name: Docs Build

on:
  pull_request:
    paths:
      - 'documentation/**'
      - 'src/qrisp/**'
      - 'pyproject.toml'
      - '.github/workflows/**'


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          pip install -e ".[docs]"
      - name: Build documentation
        run: |
          sphinx-build -b html documentation/source documentation/build/html
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: documentation/build/html
          destination_dir: pr-${{ github.event.number }}
      - name: Enable GitHub Pages (if not already)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.repos.getPages({ owner, repo });
            } catch {
              await github.rest.repos.createPagesSite({
                owner, repo,
                source: { branch: "gh-pages", path: "/" }
              });
            }
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let url;
            try {
              const { data: pages } = await github.rest.repos.getPages({ owner, repo });
              url = `${pages.html_url.replace(/\/$/, '')}/pr-${pr}/`;
            } catch {
              url = `https://cdn.statically.io/gh/${owner}/${repo}/gh-pages/pr-${pr}/index.html`;
            }
            github.rest.issues.createComment({
              issue_number: pr,
              owner, repo,
              body: `📄 Docs preview: ${url}`
            });
