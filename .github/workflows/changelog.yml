# =============================================================================
# Release Drafter
# =============================================================================
# Automatically drafts release notes as PRs are merged, and publishes a
# GitHub Release when a version tag is pushed.
#
# HOW IT WORKS
# ─────────────
#   1. PR merged to main  →  Release Drafter adds it to a draft release
#                             under the section matching its GitHub label.
#   2. Tag v* pushed       →  The draft is promoted to a real release with
#                             auto-computed version (major/minor/patch based
#                             on labels).
#
# SETUP (one time)
# ────────────────
#   1. Merge this PR (workflow + config) to main so Release Drafter can
#      read .github/release-drafter.yml from the default branch.
#   2. Create the labels in your repo matching the categories above:
#      breaking, feature, bug, refactoring, performance, documentation,
#      testing, ci, dependencies, chore, skip-changelog
#   3. That's it.  From now on, label PRs appropriately and the draft will
#      stay current automatically.
#
# WHY THIS OVER A CUSTOM SCRIPT
# ─────────────────────────────
#   - Incremental:  the draft is updated on *every* merge, not rebuilt
#     from scratch at release time.
#   - Per-PR labels make categorisation explicit and reviewable.
#   - Handles edge cases (re-opened PRs, closed-without-merge, etc.).
# =============================================================================

name: Release Drafter

on:
  pull_request_target:
    types: [opened, reopened, synchronize, closed]
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          # Publish only when a tag is pushed, not on every merge to main
          publish: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
