name: Changelog Reminder

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check changelog-dev.rst for entries
        id: check
        run: |
          if grep -q "PR #" documentation/source/general/changelog/changelog-dev.rst 2>/dev/null; then
            echo "modified=true" >> "$GITHUB_OUTPUT"
          else
            echo "modified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find existing changelog comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- CHANGELOG_CHECK_MARKER -->"

      - name: Check if already acknowledged
        id: ack
        if: steps.find.outputs.comment-id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          CID: ${{ steps.find.outputs.comment-id }}
        run: |
          body=$(gh api /repos/${{ github.repository }}/issues/comments/$CID --jq '.body')
          if echo "$body" | grep -q "Changelog entry confirmed"; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post reminder comment
        if: steps.check.outputs.modified == 'false' && steps.ack.outputs.done != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- CHANGELOG_CHECK_MARKER -->

            :memo: **Please update the developer changelog**

            It looks like this PR does not include an entry in `documentation/source/general/changelog/changelog-dev.rst`.

            Make sure your entry covers all of the following:

            - [ ] **Section** - placed under the right heading (feature section, Additional Updates, or Compatibility)
            - [ ] **First-time contributor?** - add yourself under First Time Contributors
            - [ ] **Description** - a concise explanation of what changed and why
            - [ ] **PR link** - reference the PR using `PR #NNN <URL>`
            - [ ] **Component** - which class/module/function was affected (use :class: / :func: roles)
            - [ ] **Deprecations** - if applicable, what replaces the old API

            See changelog-template.rst for the full section layout.
          edit-mode: replace

      - name: Post acknowledgment comment
        if: steps.check.outputs.modified == 'true' && steps.ack.outputs.done != 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- CHANGELOG_CHECK_MARKER -->

            :white_check_mark: **Changelog entry confirmed**

            Thanks for adding an entry to `documentation/source/general/changelog/changelog-dev.rst`!
          edit-mode: replace

      - name: Fail if no changelog entry
        if: steps.check.outputs.modified == 'false' && steps.ack.outputs.done != 'true'
        run: |
          echo "::error::changelog-dev.rst was not updated with entries for this PR."
          exit 1
