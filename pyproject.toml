[build-system]
requires = [
    "setuptools>=42",
    "wheel"
]
build-backend = "setuptools.build_meta"

[project]
name = "qrisp"
version = "0.8.2"
authors = [
    {name = "The Qrisp authors", email = "raphael.seidel@iqm.tech"},
]
description = "A high-level quantum programming language"
readme = "README.md"
requires-python = ">=3.11, <3.13"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Eclipse Public License 2.0 (EPL-2.0)",
    "Operating System :: OS Independent",
]
license = {text = "EPL-2.0 OR GPL-2.0 WITH Classpath-exception-2.0"}

dependencies = [
    "numpy==2.4.4",
    "sympy<=1.13", # https://github.com/sympy/sympy/issues/28039 - fix on dev branch, not released
    "qiskit==2.4.0",
    "matplotlib==3.10.9",
    "scipy==1.17.1",
    "numba==0.65.1",
    "networkx==3.6.1",
    "tqdm==4.67.3",
    "dill==0.4.1",
    "psutil==7.2.2",
    "stim",
    "jax==0.7.1",
    "jaxlib==0.7.1",
]

[project.optional-dependencies]
iqm = ["iqm-client[qiskit]"]
catalyst = ["pennylane-catalyst==0.15.0", "pennylane"]
xdsl = ["xdsl==0.59.0"]
test = [
    "pytest==9.0.3",
    "pytest-xdist==3.8.0",
    "qiskit-aer==0.17.2",
    "pyscf==2.13.0",
    "cirq==1.6.1",
]

[project.urls]
Homepage = "https://github.com/eclipse-qrisp/Qrisp"
"Bug Tracker" = "https://github.com/eclipse-qrisp/Qrisp/issues"

[tool.isort]
profile = "black"

[tool.pylint. messages_control]
disable = ["import-error"]

[tool.black]
line-length = 88
target-version = ["py311", "py312", "py313"]
